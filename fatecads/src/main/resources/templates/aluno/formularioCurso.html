<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos</title>
</head>
<body>
    <h1 style="text-align: center;">Cadastro de Cursos</h1>
    <form th:action="@{/curso/salvar}" method="post" th:object="${curso}">>
        <input type="hidden" th:field="*{idCurso}">
        <label>Id: </label>
        <input type="text" th:field="*{nomeCurso}">
        <label>Nome: </label>
        <input type="text" th:field="*{periodo}">
        <label>Periodo: </label>
        <input type="text" th:field="*{cargaHoraria}">
        <label>Carga Horária: </label>
        <br/>
        <input type="submit" value="Salvar">
    </form>
</body>
</html>
