<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/app.css?v=claude-20260511">
    <title>Lista de Professores</title>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">ADS</span>
                <span>Sistema Fatec ADS</span>
            </a>
            <nav class="nav" aria-label="Navegacao principal">
                <a href="/alunos/listar">Alunos</a>
                <a href="/curso/listar">Cursos</a>
                <a href="/professor/listar" aria-current="page">Professores</a>
                <a href="/disciplina/listar">Disciplinas</a>
            </nav>
        </header>

        <section class="page-header">
            <div>
                <h1 class="page-title">Professores</h1>
                <p class="page-subtitle">Consulte e mantenha os professores cadastrados.</p>
            </div>
            <a class="button button-primary" href="/professor/criar">Novo professor</a>
        </section>

        <section class="panel">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Graduacao</th>
                            <th>RM</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="professor : ${professores}">
                            <td th:text="${professor.nomeProfessor}">*</td>
                            <td th:text="${professor.telefoneProfessor}">*</td>
                            <td th:text="${professor.graduacaoProfessor}">*</td>
                            <td th:text="${professor.rmProfessor}">*</td>
                            <td>
                                <div class="actions">
                                    <a class="button" th:href="@{/professor/editar/{id}(id=${professor.idProfessor})}">Editar</a>
                                    <a class="button button-danger" th:href="@{/professor/excluir/{id}(id=${professor.idProfessor})}">Excluir</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="empty-state" th:if="${#lists.isEmpty(professores)}">Nenhum professor cadastrado.</div>
        </section>
    </main>
</body>
</html>
