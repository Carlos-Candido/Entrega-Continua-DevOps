<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Curso</title>
</head>
<body>
    <h1 style="text-align: center;">Cadastro de Curso</h1>
    <form th:action="@{/curso/salvar}" th:object="${curso}" method="post" style="text-align: center;">
        <input type="hidden" th:field="*{idCurso}" />
        <div>
            <label for="nomeCurso">Nome:</label>
            <input type="text" id="nomeCurso" th:field="*{nomeCurso}" />
        </div>
        <div>
            <label for="periodo">Período:</label>
            <input type="text" id="periodo" th:field="*{periodo}" />
        </div>
        <div>
            <label for="cargaHoraria">Carga Horária:</label>
            <input type="number" id="cargaHoraria" th:field="*{cargaHoraria}" />
        </div>
        <div>
            <button type="submit">Salvar</button>
        </div>
    </form>
</body>
</html>
