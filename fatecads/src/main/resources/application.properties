# Configuração do banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/fatecads_db
spring.datasource.username=postgres
spring.datasource.password=123456

#Atualização automática do banco de dados
spring.jpa.hibernate.ddl-auto=update

# Mostrar as consultas SQL no console
spring.jpa.show-sql=true

#Não formaatar as consultas SQL
spring.jpa.properties.hibernate.format_sql=false

#Configuração da porta do servidor
server.port=8080

# Password reset
fatecads.password-reset.token-minutes=${FATECADS_PASSWORD_RESET_TOKEN_MINUTES:30}
fatecads.mail.enabled=${FATECADS_MAIL_ENABLED:false}
fatecads.mail.from=${FATECADS_MAIL_FROM:no-reply@fatecads.local}

# SMTP configuration. Set these values with environment variables in real environments.
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
